name: Release APK

# Build a signed Android APK and publish it as a GitHub Release, consumed by
# Obtainium for auto-update notifications. Capacitor variant of the
# dont-break-the-chain ADR-010 pattern, adapted from belknap-red-line's
# release.yml (pnpm instead of npm; seed regenerated before build; APK build
# uses a relative base path so assets load from the local bundle).
#
# Fires on a v* tag push OR the manual "Run workflow" button (workflow_dispatch,
# usable from the GitHub mobile app). versionName comes from the tag (or
# package.json on a manual run); versionCode is the git commit count so it
# always increases and Android accepts the in-place update.

on:
  push:
    tags: ['v*']
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  release:
    name: Build & publish signed APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history for versionCode = commit count

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      # JDK 21 matches the toolchain used across Matt's other Android apps.
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle (cache deps + build outputs)
        uses: gradle/actions/setup-gradle@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Resolve version
        id: ver
        run: |
          if [ "${{ github.ref_type }}" = "tag" ]; then
            NAME="${{ github.ref_name }}"
            VN="${NAME#v}"
          else
            VN=$(node -p "require('./package.json').version")
            NAME="v${VN}"
          fi
          VC=$(git rev-list --count HEAD)
          echo "name=$NAME" >> "$GITHUB_OUTPUT"
          echo "versionName=$VN" >> "$GITHUB_OUTPUT"
          echo "versionCode=$VC" >> "$GITHUB_OUTPUT"
          echo "Release $NAME (versionName=$VN, versionCode=$VC)"

      - name: Regenerate seed from Cooklang
        run: pnpm cli:build && pnpm tsx scripts/generate-seed-from-cooklang.ts

      - name: Build web bundle (relative base for the local APK bundle)
        run: pnpm build:app

      - name: Capacitor sync (android)
        run: npx cap sync android

      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
        run: echo "$KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/release.jks"

      - name: Write keystore.properties
        env:
          STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: |
          cat > android/keystore.properties <<EOF
          storeFile=$RUNNER_TEMP/release.jks
          storePassword=$STORE_PASSWORD
          keyAlias=$KEY_ALIAS
          keyPassword=$KEY_PASSWORD
          EOF

      - name: Build signed release APK
        working-directory: android
        env:
          ANDROID_VERSION_CODE: ${{ steps.ver.outputs.versionCode }}
          ANDROID_VERSION_NAME: ${{ steps.ver.outputs.versionName }}
        run: |
          chmod +x ./gradlew
          ./gradlew assembleRelease --build-cache

      - name: Stage APK
        run: |
          mkdir -p out
          cp android/app/build/outputs/apk/release/*.apk \
            "out/meal-planner-${{ steps.ver.outputs.name }}.apk"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.name }}
          files: out/*.apk
          generate_release_notes: true
          fail_on_unmatched_files: true
